<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學術工具集</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #e8e3d8; --bg2: #f6f3ee; --bg3: #ede9e0;
      --border: rgba(50,32,10,0.10); --border2: rgba(50,32,10,0.18);
      --t1: #1c1812; --t2: #6b5e4e; --t3: #a8967e;
      --cyan: #2a4faa; --cyan-dim: rgba(42,79,170,0.08);
      --amber: #c24128;
      --nav-h: 54px;
    }
    html, body {
      height: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 6px rgba(50,32,10,0.07);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .nav-stripe {
      height: 3px;
      background: linear-gradient(90deg, #1a2f6e 0%, var(--cyan) 55%, var(--amber) 100%);
      position: relative;
    }
    /* Collapse toggle lives on the stripe */
    .nav-collapse-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--t3);
      transition: all 0.15s;
      box-shadow: 0 1px 4px rgba(50,32,10,0.12);
      z-index: 10;
      line-height: 1;
    }
    .nav-collapse-btn:hover {
      background: var(--bg3);
      color: var(--t1);
      border-color: var(--t3);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: var(--nav-h);
      gap: 0;
      overflow: hidden;
      transition: height 0.25s cubic-bezier(.4,0,.2,1), opacity 0.2s;
    }
    .nav-inner.collapsed {
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 20px;
      color: #1a2f6e;
      letter-spacing: 0.04em;
      margin-right: 28px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-logo small {
      font-family: 'IBM Plex Mono', monospace;
      font-style: normal;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--t3);
      font-weight: 600;
      vertical-align: middle;
      margin-left: 8px;
    }
    .nav-tabs { display: flex; gap: 4px; align-items: center; }
    .nav-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      border: 1px solid transparent;
      background: none;
      font-family: 'Noto Sans TC', sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .nav-tab:hover { background: var(--bg3); color: var(--t1); border-color: var(--border); }
    .nav-tab.active { background: var(--cyan-dim); color: var(--cyan); border-color: rgba(42,79,170,0.25); font-weight: 600; }
    .nav-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--border);
      color: var(--t3);
      text-transform: uppercase;
    }
    .nav-tab.active .nav-badge { background: rgba(42,79,170,0.12); color: var(--cyan); }

    /* ── CONTENT ── */
    .content-wrap { flex: 1; position: relative; overflow: hidden; }
    .tool-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; background: var(--bg); }
    .tool-frame.active { display: block; }

    .frame-loader {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: var(--bg); transition: opacity 0.3s; z-index: 10;
    }
    .frame-loader.hidden { opacity: 0; pointer-events: none; }
    .loader-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--t3); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav class="navbar">

      </div>
    </div>
  </nav>

  <div class="content-wrap">

      <div class="loader-spinner"></div>

    </div>

      <div class="loader-spinner"></div>

    </div>
    <div class="frame-loader hidden" id="loader-mailgen">

    </div>
    <iframe class="tool-frame active" id="frame-taica" title="TAICA 課程查詢系統"></iframe>
    <iframe class="tool-frame" id="frame-multiopen" title="NTU COOL 批量開啟工具"></iframe>
    <iframe class="tool-frame" id="frame-mailgen" title="信件生成器"></iframe>
  </div>

        }

        .tgt-btn:hover {
            background: rgba(50, 32, 10, 0.05);
            color: var(--t1);
            transform: translateY(-1px);
        }

        .tgt-btn.tc {
            background: var(--cyan-dim);
            color: var(--cyan);
        }

        .tgt-btn.tf {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .tgt-btn.ts {
            background: var(--green-dim);
            color: var(--green);
        }

        .tgt-btn.tm {
            background: var(--purple-dim);
            color: var(--purple);
        }

        .copy-all-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--purple-dim);
            color: var(--purple);
            border: 1px solid rgba(26, 107, 116, .28);
            font-size: 11px;
            font-weight: 600;
            padding: 5px 13px;
            border-radius: 6px;
            font-family: 'Noto Sans TC', sans-serif;
            cursor: pointer;
            transition: all .14s;
        }

        .copy-all-btn:hover {
            background: rgba(26, 107, 116, .14);
            transform: translateY(-1px);
            box-shadow: 0 5px 18px rgba(26, 107, 116, .22);
        }

        /* ── TABLE ── */
        .dtbl {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .dtbl thead th {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--bg2);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--t3);
            padding: 9px 11px;
            border-bottom: 1px solid var(--border);
        }

        .dtbl tbody tr {
            border-bottom: 1px solid var(--border);
            border-left: 2px solid transparent;
            cursor: pointer;
            transition: background .09s, box-shadow .14s;
        }

        .dtbl tbody tr:hover {
            background: rgba(42, 79, 170, .04);
            box-shadow: inset 3px 0 0 rgba(42, 79, 170, .28);
        }

        .dtbl tbody tr.tr-on {
            background: var(--cyan-dim) !important;
            border-left-color: var(--cyan) !important;
        }

        .dtbl tbody tr.tr-off {
            opacity: .32;
            cursor: not-allowed;
        }

        .dtbl tbody tr {
            height: 46px;
        }

        .dtbl tbody td {
            padding: 8px 11px;
            vertical-align: middle;
        }

        .row-open {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 7px;
            color: var(--cyan);
            font-size: 10px;
            opacity: 0;
            transition: opacity .13s, background .15s, color .15s, border-color .15s;
            text-decoration: none;
        }

        .dtbl tbody tr:hover .row-open {
            opacity: 1;
        }

        .row-open:hover {
            background: var(--cyan);
            color: #fff;
            border-color: var(--cyan);
        }

        /* ── FLOAT COPY / OPEN ── */
        .fcopy-group {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 50;
        }

        .fcopy,
        .fopen {
            background: var(--bg2);
            padding: 10px 22px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform .18s, box-shadow .18s;
            white-space: nowrap;
        }

        .fcopy {
            border: 1px solid rgba(42, 79, 170, .35);
            box-shadow: 0 8px 32px rgba(42, 79, 170, .16), 0 4px 16px rgba(50, 32, 10, .10);
            color: var(--cyan);
        }

        .fopen {
            border: 1px solid rgba(26, 107, 116, .35);
            box-shadow: 0 8px 32px rgba(26, 107, 116, .16), 0 4px 16px rgba(50, 32, 10, .10);
            color: var(--purple);
        }

        .fcopy:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 16px 48px rgba(42, 79, 170, .28), 0 4px 16px rgba(50, 32, 10, .12), 0 0 0 4px rgba(42, 79, 170, .08);
        }

        .fopen:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 16px 48px rgba(26, 107, 116, .28), 0 4px 16px rgba(50, 32, 10, .12), 0 0 0 4px rgba(26, 107, 116, .08);
        }

        /* ── TOAST ── */
        .toast-box {
            position: fixed;
            bottom: 22px;
            right: 22px;
            z-index: 50;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 18px;
            box-shadow: 0 8px 32px rgba(50, 32, 10, .12);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 500;
            color: var(--t1);
        }

        /* ── LOADER ── */
        .spin-ring {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--border2);
            border-top-color: var(--cyan);
            animation: spn .72s linear infinite;
        }

        @keyframes spn {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── TRANSITIONS ── */
        .toast-enter-active {
            transition: all .3s cubic-bezier(.34, 1.56, .64, 1);
        }

        .toast-leave-active {
            transition: all .2s ease;
        }

        .toast-enter-from,
        .toast-leave-to {
            opacity: 0;
            transform: translateY(10px) scale(.94);
        }

        /* ── SCROLLBAR ── */
        .cscroll::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .cscroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .cscroll::-webkit-scrollbar-thumb {
            background: var(--bg4);
            border-radius: 2px;
        }

        .cscroll::-webkit-scrollbar-thumb:hover {
            background: var(--t3);
        }

        /* ── EMPTY / DASHED ── */
        .empty-pane {
            min-height: calc(100vh - 64px - 24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px dashed var(--border2);
            border-radius: 8px;
            color: var(--t3);
        }
    <\/style>
<\/head>

                                        <span v-if="tableSelection.size > 0" style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;background:var(--cyan-dim);padding:3px 9px;border-radius:4px;border:1px solid rgba(42,79,170,.28);color:var(--cyan);">{{ tableSelection.size }} selected<\/span>

                                <!-- 第二列：ROLE（獨立一行，避免換行跳動）-->
                                <div v-if="selectedCourse?.type === '混合課程' || selectedCourse?.twoStep"
                                    style="display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);margin-top:7px;padding-top:7px;">
                                    <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.1em;">ROLE<\/span>
                                    <div class="tgt-grp">
                                        <button @click="setRoleFilter('全部')" :class="['tgt-btn', roleFilter==='全部'?'tc':'']">全部<\/button>
                                        <div style="width:1px;background:var(--border);margin:2px 0;"><\/div>
                                        <template v-if="selectedCourse?.twoStep">
                                            <button @click="setRoleFilter('清大組')" :class="['tgt-btn', roleFilter==='清大組'?'tm':'']">
                                                <i class="fa-solid fa-circle-half-stroke" style="font-size:9px;"><\/i>清大組
                                            <\/button>
                                            <div style="width:1px;background:var(--border);margin:2px 0;"><\/div>
                                            <button @click="setRoleFilter('各校組')" :class="['tgt-btn', roleFilter==='各校組'?'ts':'']">
                                                <i class="fa-solid fa-satellite-dish" style="font-size:9px;"><\/i>各校組
                                            <\/button>
                                        <\/template>
                                        <template v-else>
                                            <button @click="setRoleFilter('鏡像')" :class="['tgt-btn', roleFilter==='鏡像'?'tm':'']">
                                                <i class="fa-solid fa-circle-half-stroke" style="font-size:9px;"><\/i>鏡像
                                            <\/button>
                                            <div style="width:1px;background:var(--border);margin:2px 0;"><\/div>
                                            <button @click="setRoleFilter('衛星')" :class="['tgt-btn', roleFilter==='衛星'?'ts':'']">
                                                <i class="fa-solid fa-satellite-dish" style="font-size:9px;"><\/i>衛星
                                            <\/button>
                                        <\/template>
                                    <\/div>
                                <\/div>
                            <\/div>

                            <!-- 合併檢視：所有學校共用同一連結時顯示 -->
                            <div v-if="consolidatedUrl" style="padding:22px 24px;display:flex;flex-direction:column;gap:14px;">
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <i class="fa-solid fa-graduation-cap" style="color:var(--cyan);font-size:13px;"><\/i>
                                    <span style="font-weight:700;font-size:13px;color:var(--t1);">{{ filteredSchools.length }} 所學校共用同一課程頁面連結<\/span>
                                <\/div>
                                <a :href="consolidatedUrl" target="_blank" @dblclick.prevent="() => window.open(consolidatedUrl, '_blank')" @contextmenu.prevent="handleRightClickCopy(consolidatedUrl)" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--cyan);background:var(--cyan-dim);border:1px solid rgba(42,79,170,.18);padding:10px 14px;border-radius:6px;word-break:break-all;display:block;text-decoration:none;cursor:pointer;" title="單擊開啟，右鍵複製">{{ consolidatedUrl }}<\/a>
                                <button @click="copyToClipboard(consolidatedUrl, 1, true)" style="align-self:flex-start;display:flex;align-items:center;gap:7px;background:var(--cyan-dim);color:var(--cyan);border:1px solid rgba(42,79,170,.28);font-size:12px;font-weight:600;padding:7px 16px;border-radius:6px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;">
                                    <i class="fa-regular fa-copy"><\/i>複製連結
                                <\/button>
                                <div style="border-top:1px solid var(--border);padding-top:12px;">
                                    <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--t3);margin-bottom:7px;letter-spacing:.08em;">SCHOOLS<\/div>
                                    <div style="display:flex;flex-wrap:wrap;gap:5px;">
                                        <span v-for="item in filteredSchools" :key="item.school" style="font-size:11px;padding:3px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--t2);">{{ item.school }}<\/span>
                                    <\/div>
                                <\/div>
                            <\/div>

                            <!-- 一般表格 -->
                            <div v-else ref="tableContainer" class="cscroll" style="overflow:auto;max-height:70vh;">
                                <table class="dtbl">
                                    <thead>
                                        <tr>
                                            <th style="width:42px;text-align:center;">
                                                <input type="checkbox" :checked="allSelected"
                                                    :indeterminate.prop="someSelected" @change="toggleSelectAll"
                                                    @mousedown.stop
                                                    style="cursor:pointer;accent-color:var(--cyan);width:13px;height:13px;vertical-align:middle;">
                                            <\/th>
                                            <th style="width:32%;">學校<\/th>
                                            <th>
                                                <span v-if="tableTarget==='cool'"><i class="fa-solid fa-graduation-cap"
                                                        style="color:var(--cyan);margin-right:4px;font-size:9px;"><\/i>COOL<\/span>
                                                <span v-else-if="tableTarget==='cool_main'"><i class="fa-solid fa-graduation-cap"
                                                        style="color:var(--amber);margin-right:4px;font-size:9px;"><\/i>主導課程（旁聽生）<\/span>
                                                <span v-else-if="tableTarget==='cool_student'"><i class="fa-solid fa-graduation-cap"
                                                        style="color:var(--cyan);margin-right:4px;font-size:9px;"><\/i>課程頁面（學生）<\/span>
                                                <span v-else-if="tableTarget==='folder'"><i
                                                        class="fa-regular fa-folder-open"
                                                        style="color:var(--amber);margin-right:4px;font-size:9px;"><\/i>資料夾<\/span>
                                                <span v-else><i class="fa-solid fa-table"
                                                        style="color:var(--green);margin-right:4px;font-size:9px;"><\/i>分頁<\/span>
                                                <span style="color:var(--t3);">/ url<\/span>
                                            <\/th>
                                        <\/tr>
                                    <\/thead>
                                    <tbody>
                                        <tr v-for="(item, index) in filteredSchools" :key="item.school"
                                            :data-idx="index"
                                            @mousedown="handleMouseDown(index, $event, item)"
                                            @mouseenter="handleMouseEnter(index, item)"
                                            @dblclick.stop="openSingleRow(item)"
                                            :class="[isRowSelected(index)?'tr-on':'', getTargetLink(item)?.disabled?'tr-off':'']">
                                            <td
                                                style="text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3);">
                                                {{ index+1 }}<\/td>
                                            <td>
                                                <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
                                                    <span style="font-weight:600;font-size:12px;"
                                                        :style="isRowSelected(index)?'color:var(--cyan)':'color:var(--t1)'">{{
                                                        item.school }}<\/span>
                                                    <span v-if="item.isHost" class="bdg bdg-host">開課<\/span>
                                                    <span :class="['bdg', (item.role==='鏡像'||item.role==='清大組')?'bdg-mirror':'bdg-sat']">{{
                                                        item.role }}<\/span>
                                                <\/div>
                                            <\/td>
                                            <td style="position:relative;" class="group">
                                                <template v-if="getTargetLink(item)">
                                                    <span
                                                        style="font-family:'IBM Plex Mono',monospace;font-size:10px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px;"
                                                        :style="isRowSelected(index)?'color:var(--cyan)':'color:var(--t3)'">
                                                        {{ getTargetLink(item).disabled ? '— 無有效連結 —' :
                                                        getTargetLink(item).url + (['cool','cool_main','cool_student'].includes(tableTarget) ? coolSuffix : '') }}
                                                    <\/span>
                                                    <a v-if="!getTargetLink(item).disabled"
                                                        :href="getTargetLink(item).url + (['cool','cool_main','cool_student'].includes(tableTarget) ? coolSuffix : '')" target="_blank" class="row-open"
                                                        title="在新分頁開啟" @mousedown.stop>
                                                        <i class="fa-solid fa-external-link-alt"><\/i>
                                                    <\/a>
                                                <\/template>
                                                <span v-else
                                                    style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--t3);display:block;">—<\/span>
                                            <\/td>
                                        <\/tr>
                                    <\/tbody>
                                <\/table>
                            <\/div>
                        <\/div>

                    <\/div>
                <\/div>
            <\/section>

        <\/div><!-- /main-wrap -->

        <!-- Float copy / open -->
        <transition name="toast">
            <div v-if="viewMode==='table' && tableSelection.size > 0" class="fcopy-group">
                <div class="fcopy" @click="copyTableSelection">
                    <i class="fa-regular fa-copy" style="font-size:13px;"><\/i>
                    <span style="font-weight:700;font-size:13px;">複製 {{ tableSelection.size }} 個{{ targetLabel }}<\/span>
                <\/div>
                <div class="fopen" @click="openTableSelection">
                    <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:13px;"><\/i>
                    <span style="font-weight:700;font-size:13px;">開啟 {{ tableSelection.size }} 個分頁<\/span>
                    <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--purple-dim);border:1px solid rgba(26,107,116,.28);padding:2px 9px;border-radius:20px;">ctrl+↵<\/span>
                <\/div>
            <\/div>
        <\/transition>

        <!-- Toast -->
        <transition name="toast">
            <div v-if="showToast" class="toast-box">
                <i class="fa-solid fa-circle-check" style="color:var(--green);font-size:13px;"><\/i>
                <span>{{ toastMessage }}<\/span>
            <\/div>
        <\/transition>

    <\/div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted, reactive } = Vue;

        // 混合課程卡片模式學校顯示順序
        const SCHOOL_ORDER = [
            '國立政治大學', '國立清華大學', '國立臺灣大學', '國立臺灣師範大學', '國立成功大學',
            '國立中興大學', '國立陽明交通大學', '國立中央大學', '國立中山大學', '國立臺灣海洋大學',
            '國立中正大學', '國立高雄師範大學', '國立彰化師範大學', '國立臺北大學', '國立嘉義大學',
            '國立高雄大學', '國立東華大學', '國立臺灣科技大學', '國立雲林科技大學', '國立臺北科技大學',
            '國立宜蘭大學', '國立聯合大學', '國立虎尾科技大學', '國立臺南大學', '國立勤益科技大學',
            '國立金門大學', '國立臺中科技大學', '國立高雄科技大學', '國立空中大學', '東海大學',
            '輔仁大學', '東吳大學', '中原大學', '淡江大學', '逢甲大學', '靜宜大學', '長庚大學',
            '元智大學', '銘傳大學', '實踐大學', '朝陽科技大學', '高雄醫學大學', '大同大學',
            '南臺科技大學', '崑山科技大學', '慈濟大學', '臺北醫學大學', '龍華科技大學', '長榮大學',
            '中國醫藥大學', '正修科技大學', '明志科技大學', '亞洲大學', '開南大學', '致理科技大學'
        ];
        const schoolOrderIndex = (name) => {
            const n = name.replace(/台/g, '臺');
            const i = SCHOOL_ORDER.findIndex(s => s === n);
            return i === -1 ? SCHOOL_ORDER.length : i;
        };

        createApp({
            setup() {
                const loading = ref(true);
                const useMockData = ref(false);
                const allData = ref([]);
                const courseTypes = ['全部', '鏡像課程', '衛星課程', '混合課程'];
                const selectedType = ref('全部');
                const selectedCourse = ref(null);
                const searchKeyword = ref('');
                const viewMode = ref('card');

                // 常用資源連結 (從後端「常用資源」工作表載入，以下為預設值)
                const generalLinks = ref([
                    { name: '教師/助教/承辦聯繫資訊', url: 'https://docs.google.com/spreadsheets/d/1A3ap2U9vvHZlQSUpfmp3WcIf6m-BTc54NOxTBkD9jwo/edit?gid=676285020#gid=676285020', icon: 'fa-solid fa-address-book', color: 'text-green-600' },
                    { name: '信件生成工具', url: 'https://yucecil.github.io/mail-generate/mailgenerate.html', icon: 'fa-solid fa-envelope-open-text', color: 'text-red-500' },
                    { name: '多開工具', url: 'https://yucecil.github.io/ntu-cool-mutiopen/%E5%A4%9A%E9%96%8B%E7%B6%B2%E9%A0%81.html', icon: 'fa-solid fa-rocket', color: 'text-purple-600' },
                    { name: '修課人數統計', url: 'https://docs.google.com/spreadsheets/d/1s0Oh-y-Pqaij1wFLktqm6DdggoRvXSx-Wnde5l_Ie7E/edit?usp=drive_link', icon: 'fa-solid fa-chart-simple', color: 'text-emerald-600' },
                    { name: '混合鏡像人數統計', url: 'https://docs.google.com/spreadsheets/d/1mqKe4PRdBZtojd2iTmvG1Ydrnwd8vwOtX2_R5zQwI8s/edit?usp=drive_link', icon: 'fa-solid fa-chart-pie', color: 'text-teal-600' },
                    { name: '加退選SOP', url: 'https://docs.google.com/document/d/1gGFJMbTWzdWOatxJTOfNnqZ9GndO5AXL2wMm8nIqyZA/edit?tab=t.0#heading=h.eu619a7iml75', icon: 'fa-solid fa-clipboard-list', color: 'text-blue-700' },
                    { name: '新手村', url: 'https://cool.ntu.edu.tw/courses/58787', icon: 'fa-solid fa-gamepad', color: 'text-blue-500' },
                    { name: '生成式 AI 的人文導論_交流課程', url: 'https://cool.ntu.edu.tw/courses/58791', icon: 'fa-solid fa-comments', color: 'text-indigo-500' },
                    { name: '人工智慧倫理_交流課程', url: 'https://cool.ntu.edu.tw/courses/58792', icon: 'fa-solid fa-comments', color: 'text-indigo-500' },
                    { name: '機器導航與探索_交流課程', url: 'https://cool.ntu.edu.tw/courses/58793', icon: 'fa-solid fa-comments', color: 'text-indigo-500' }
                ]);

                const tableContainer = ref(null);
                const tableSelection = reactive(new Set());
                const isDragging = ref(false);
                const dragStartIndex = ref(-1);
                const selectionAnchor = ref(-1);
                const snapshotSelection = ref(new Set());
                const isCtrlDrag = ref(false);
                const currentScrollSpeed = ref(0);
                const tableTarget = ref('cool');
                const roleFilter = ref('全部');
                const coolSuffix = ref('');

                let autoScrollInterval = null;
                const showToast = ref(false);
                const toastMessage = ref('');

                const showToastMsg = (msg) => {
                    toastMessage.value = msg;
                    showToast.value = true;
                    setTimeout(() => { showToast.value = false; }, 3000);
                };

                // ↓ 填入 GAS 部署網址（重新部署後更新此處）
                const GAS_URL = 'https://script.google.com/macros/s/AKfycbxvSw5VLnKAGcUe3-WNTualJ8kx27HltkhIwJvuktNkE92DG-ZA1iaTZtiL2e7pWnts/exec';

                const SCACHE_KEY = 'taica_v1';

                const applyData = (parsed) => {
                    allData.value = parsed.courses;
                    if (parsed.generalLinks && parsed.generalLinks.length > 0) {
                        generalLinks.value = parsed.generalLinks;
                    }
                    loading.value = false;
                };

                const fetchData = () => {
                    // 1. 先查 sessionStorage — 命中時資料瞬間顯示，跳過 GAS 呼叫
                    try {
                        const cached = sessionStorage.getItem(SCACHE_KEY);
                        if (cached) {
                            applyData(JSON.parse(cached));
                            return;
                        }
                    } catch (e) {
                        sessionStorage.removeItem(SCACHE_KEY);
                    }

                    // 2. 尚未設定 GAS URL → 切換測試模式
                    if (!GAS_URL || GAS_URL === 'YOUR_GAS_DEPLOY_URL') {
                        console.warn('GAS URL 未設定，載入測試資料。');
                        useMockData.value = true;
                        loadMockData();
                        return;
                    }

                    // 3. 呼叫 GAS API
                    fetch(GAS_URL)
                        .then(r => r.text())
                        .then(text => {
                            try { sessionStorage.setItem(SCACHE_KEY, text); } catch (e) { }
                            applyData(JSON.parse(text));
                        })
                        .catch(error => {
                            console.error('API 呼叫失敗，載入測試資料：', error);
                            alert('讀取資料失敗，將切換至測試模式: ' + error);
                            useMockData.value = true;
                            loadMockData();
                        });
                };

                const loadMockData = () => {
                    setTimeout(() => {
                        allData.value = [
                            {
                                id: "mock1", type: "鏡像課程", name: "智慧製造執行系統",
                                globalLinks: [{ name: "名單總表", url: "https://docs.google.com/spreadsheets/example" }],
                                schools: [
                                    { school: "國立成功大學", isHost: true, role: "鏡像", links: [{ type: "folder", url: "#folder1", label: "Folder" }, { type: "cool", url: "https://cool.ntu.edu.tw/courses/mock1", label: "COOL" }, { type: "sheet", url: "#sheet1", label: "Sheet" }] },
                                    { school: "龍華科技大學", isHost: false, role: "鏡像", links: [{ type: "cool", url: "https://cool.ntu.edu.tw/courses/mock2", label: "COOL" }, { type: "folder", url: "#folder2", label: "Folder" }] },
                                    { school: "長榮大學", isHost: false, role: "鏡像", links: [{ type: "cool", url: "https://cool.ntu.edu.tw/courses/mock3", label: "COOL" }] }
                                ]
                            },
                            {
                                id: "mock2", type: "衛星課程", name: "人工智慧倫理",
                                globalLinks: [{ name: "名單總表", url: "https://docs.google.com/spreadsheets/example2" }],
                                schools: [
                                    { school: "東海大學", isHost: true, role: "衛星", links: [{ type: "cool", url: "#", label: "COOL", disabled: true }, { type: "folder", url: "#folderA", label: "Folder" }] },
                                    { school: "國立臺灣大學", isHost: false, role: "衛星", links: [{ type: "cool", url: "#", label: "COOL", disabled: true }] },
                                    { school: "靜宜大學", isHost: false, role: "衛星", links: [{ type: "cool", url: "https://cool.ntu.edu.tw/courses/mock6", label: "COOL" }] }
                                ]
                            }
                        ];
                        loading.value = false;
                    }, 800);
                };

                const allMainCoolUrls = computed(() =>
                    filteredCourses.value
                        .flatMap(c => c.globalLinks || [])
                        .filter(l => l.url && (l.url.includes('cool.ntu.edu.tw') || (l.name && l.name.includes('主導'))))
                        .map(l => l.url)
                );

                const allRosterUrls = computed(() =>
                    filteredCourses.value
                        .flatMap(c => c.globalLinks || [])
                        .filter(l => l.url && !l.url.includes('cool.ntu.edu.tw') && !(l.name && l.name.includes('主導')))
                        .map(l => l.url)
                );

                const openAllMainCool = () => {
                    if (allMainCoolUrls.value.length === 0) { showToastMsg('沒有可開啟的連結'); return; }
                    if (allMainCoolUrls.value.length > 10 && !confirm(\`將開啟 \${allMainCoolUrls.value.length} 個分頁，確定繼續？\`)) return;
                    allMainCoolUrls.value.forEach((url, i) => setTimeout(() => window.open(url, '_blank'), i * 300));
                    showToastMsg(\`已開啟 \${allMainCoolUrls.value.length} 個主導課程分頁\`);
                };

                const openAllRosters = () => {
                    if (allRosterUrls.value.length === 0) { showToastMsg('沒有可開啟的連結'); return; }
                    if (allRosterUrls.value.length > 10 && !confirm(\`將開啟 \${allRosterUrls.value.length} 個分頁，確定繼續？\`)) return;
                    allRosterUrls.value.forEach((url, i) => setTimeout(() => window.open(url, '_blank'), i * 300));
                    showToastMsg(\`已開啟 \${allRosterUrls.value.length} 個名單總表分頁\`);
                };

                const filteredCourses = computed(() => {
                    if (selectedType.value === '全部') return allData.value;
                    return allData.value.filter(c => c.type === selectedType.value);
                });

                const filteredSchools = computed(() => {
                    if (!selectedCourse.value) return [];
                    let schools = selectedCourse.value.schools;
                    if (searchKeyword.value.trim() !== '') {
                        const normalize = (str) => str.replace(/台/g, '臺').toLowerCase();
                        const keyword = normalize(searchKeyword.value);
                        schools = schools.filter(s => normalize(s.school).includes(keyword));
                    }
                    if (viewMode.value === 'table' && (selectedCourse.value.type === '混合課程' || selectedCourse.value.twoStep) && roleFilter.value !== '全部') {
                        schools = schools.filter(s => s.role === roleFilter.value);
                    }
                    // 混合課程卡片模式依指定順序排列
                    if (viewMode.value === 'card' && selectedCourse.value.type === '混合課程') {
                        schools = [...schools].sort((a, b) => schoolOrderIndex(a.school) - schoolOrderIndex(b.school));
                    }
                    return schools;
                });

                const getTargetLink = (item) => item.links.find(l => l.type === tableTarget.value);

                const getEffectiveUrl = (item) => {
                    const link = getTargetLink(item);
                    if (!link || link.disabled) return null;
                    const isCool = ['cool', 'cool_main', 'cool_student'].includes(tableTarget.value);
                    return link.url + (isCool ? coolSuffix.value : '');
                };

                    if (tableTarget.value === 'cool_main') return '主導課程';
                    if (tableTarget.value === 'cool_student') return '課程頁面';
                    if (tableTarget.value === 'folder') return '資料夾';
                    if (tableTarget.value === 'sheet') return '分頁';

                });

                    roleFilter.value = '全部';

                    filteredSchools.value
                        .map((item, i) => isRowSelectable(item) ? i : -1)
                        .filter(i => i !== -1)
                );
                const allSelected = computed(() => {
                    const sel = allSelectableIndices.value;
                    return sel.length > 0 && sel.every(i => tableSelection.has(i));

                const someSelected = computed(() =>

                    let speed = 0;
                    if (e.clientY < top + threshold) speed = -maxSpeed * ((top + threshold - e.clientY) / threshold);
                    else if (e.clientY > bottom - threshold) speed = maxSpeed * ((e.clientY - (bottom - threshold)) / threshold);

                        .map(i => getEffectiveUrl(filteredSchools.value[i]))
                        .filter(u => u !== null);

                const openTableSelection = () => {

                        .map(i => getEffectiveUrl(filteredSchools.value[i]))
                        .filter(u => u !== null);

            let suffix = suffixSelect.value;
            const delay = getDelay(); // 取得延遲設定

            if (!raw.trim()) {
                alert('請先輸入資料');
                urlList.focus();
                return;
            }

            setLoading(openBtn, true);
            updateStatus('正在解析...');

            const entries = raw.split(/[\\n,]+/).map(s => s.trim()).filter(Boolean);

            // 模式 A：搜尋學號
            if (suffix === 'search-users') {
                entries.forEach((id, i) => {
                    const cleanId = id.includes('@') ? id.split('@')[0] : id;
                    const url = \`https://cool.ntu.edu.tw/accounts/1/users?search_term=\${encodeURIComponent(cleanId)}&role_filter_id=&page=\`;
                    setTimeout(() => {
                        window.open(url, '_blank');
                        updateStatus(\`正在搜尋第 \${i + 1} / \${entries.length} 位使用者...\`);
                    }, i * delay);
                });

                setTimeout(() => {
                    updateStatus(\`已完成\`);
                    setLoading(openBtn, false);
                }, entries.length * delay + 500);
                return;
            }

            // 模式 B：自訂後綴
            if (suffix === 'custom') {
                let c = customInput.value.trim();
                if (!c) {
                    alert('請輸入自訂後綴內容');
                    customInput.focus();
                    setLoading(openBtn, false);
                    updateStatus('');

                if (!c.startsWith('/') && !c.startsWith('#')) c = '/' + c;
                suffix = c;

            // 模式 C：一般課程網址處理
            const validUrls = entries.filter(u => u.includes('cool.ntu.edu.tw/courses/'));

            if (!validUrls.length) {
                alert('未偵測到有效的 COOL 課程連結。\\n若要開啟非課程連結，請使用右下角的「直接開啟網址」。');
                setLoading(openBtn, false);
                updateStatus('');
                return;
            }

            validUrls.forEach((u, i) => {
                let urlObj;
                try {
                    urlObj = new URL(u.startsWith('http') ? u : 'https://' + u);
                } catch { return; }

                if (suffix.includes('#')) {
                    const [pathSuffix, frag] = suffix.split('#');
                    urlObj.pathname = urlObj.pathname.replace(/\\/+$/, '') + (pathSuffix || '');
                    urlObj.hash = '#' + frag;
                } else {
                    urlObj.pathname = urlObj.pathname.replace(/\\/+$/, '') + suffix;
                }

                setTimeout(() => {
                    window.open(urlObj.href, '_blank');
                    updateStatus(\`開啟中 \${i + 1} / \${validUrls.length}\`);
                }, i * delay);
            });

            setTimeout(() => {
                updateStatus(\`已完成\`);
                setLoading(openBtn, false);
            }, validUrls.length * delay + 500);

                        updateStatus(\`開啟中 \${i + 1} / \${entries.length}\`);
                    }, i * delay);
                    openedCount++;
                } catch (_) { }
            });

            setTimeout(() => {
                if (openedCount === 0) {
                    alert('無法識別有效的網址，請檢查輸入內容。');
                    updateStatus('');
                } else {
                    updateStatus(\`全部完成\`);
                }
                setLoading(openRawBtn, false);

<script>
        // --- 初始狀態與變數 ---
        const defaultData = \`姓名,Email,學校,課程名稱,課程連結
王大明,ming@example.com,臺北科技大學,人工智慧導論,https://ntut.edu.tw/ai
李小華,"hua@example.com\\nlee@gmail.com",成功大學,Python基礎,https://ncku.edu.tw/python
張志明,chang@example.com,清華大學,資料結構,
陳小美,may@example.com,台灣大學,網頁設計,\`;

        const defaultBody = \`<div><span style="font-family: Calibri, sans-serif; font-size: 12pt;">您好 <b>{姓名:姓}<\/b> 老師：<\/span><\/div><br><div><span style="font-family: Calibri, sans-serif; font-size: 12pt;">感謝您在 {學校} 開設「<span style="color: blue;">{課程名稱}<\/span>」。<\/span><\/div><div><span style="font-family: Calibri, sans-serif; font-size: 12pt;">您的課程連結如下：<\/span><\/div><div><a href="{課程連結}" style="font-family: Calibri, sans-serif; font-size: 12pt;">{課程連結}<\/a><\/div><br><div><span style="font-family: Calibri, sans-serif; font-size: 12pt;">(若連結為空，則不顯示連結)<\/span><\/div><br><div><span style="font-family: Calibri, sans-serif; font-size: 12pt;">教務團隊 敬上<\/span><\/div>\`;

        let state = {
            csvInput: defaultData,
            subjectTemplate: '關於 {學校} 的 {課程名稱} 開課通知',
            parsedData: [],
            displayData: [],
            headers: [],
            bodyTemplate: defaultBody,
            grouping: { enabled: false, column: '' },
            showBCC: false
        };

        const STORAGE_KEY = 'email_generator_state_v18_csv'; // Version bump
        let savedRange = null;
        let lastFocusedElement = null; // Track last focused input/editor

        // DOM 元素引用
        const els = {
            csvInput: document.getElementById('csv-input'),
            dataCount: document.getElementById('data-count'),
            tablePreview: document.getElementById('table-preview-container'),
            variableButtons: document.getElementById('variable-buttons'),
            subjectInput: document.getElementById('subject-input'),
            editor: document.getElementById('editor-content'),
            previewContainer: document.getElementById('preview-container'),
            groupEnable: document.getElementById('group-enable'),
            groupSettings: document.getElementById('group-settings'),
            groupColumn: document.getElementById('group-column'),
            bccToggle: document.getElementById('bcc-toggle'),
            // Modal Elements
            linkModal: document.getElementById('link-modal'),
            linkUrlInput: document.getElementById('link-url-input'),
            linkModalVariables: document.getElementById('link-modal-variables'),

            btns: {
                data: document.getElementById('btn-tab-data'),
                template: document.getElementById('btn-tab-template'),
                preview: document.getElementById('btn-tab-preview')
            },
            tabs: {
                data: document.getElementById('tab-data'),
                template: document.getElementById('tab-template'),
                preview: document.getElementById('tab-preview')
            }
        };

        // --- 初始化 ---
        function init() {
            try {
                loadState();
                els.csvInput.value = state.csvInput;
                els.subjectInput.value = state.subjectTemplate;
                els.editor.innerHTML = state.bodyTemplate || defaultBody;

                els.groupEnable.checked = state.grouping.enabled;
                if (state.grouping.enabled) els.groupSettings.classList.remove('hidden');

                els.bccToggle.checked = state.showBCC;
                updateBCCVisibility();

                // Default focus tracking
                lastFocusedElement = els.editor;

                els.csvInput.addEventListener('input', (e) => {
                    state.csvInput = e.target.value;
                    parseData();
                    saveState();
                });

                els.subjectInput.addEventListener('input', (e) => {
                    state.subjectTemplate = e.target.value;
                    saveState();
                });
                // Track focus on subject input
                els.subjectInput.addEventListener('focus', () => {
                    lastFocusedElement = els.subjectInput;
                });

                els.editor.addEventListener('input', (e) => {
                    state.bodyTemplate = els.editor.innerHTML;
                    saveState();
                });
                // Track focus on editor
                els.editor.addEventListener('focus', () => {
                    lastFocusedElement = els.editor;
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.relative.inline-block') && !e.target.closest('#link-modal')) {
                        closeAllMenus();
                    }
                });

                parseData();

                // Safe lucide loading
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    lucide.createIcons();
                } else {
                    console.warn('Lucide icons not loaded yet.');
                }
            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        // --- File Upload Handler ---
        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                els.csvInput.value = content;
                state.csvInput = content;
                parseData();
                saveState();
                input.value = ''; // Reset file input
                alert(\`已成功讀取檔案：\${file.name}\`);
            };
            reader.onerror = () => {
                alert('檔案讀取發生錯誤');
                input.value = '';
            };
            // Default to UTF-8
            reader.readAsText(file);
        }

        // --- Improved Robust CSV/TSV Parser ---
        function parseCSVToObjects(text) {
            if (!text || !text.trim()) return { headers: [], data: [] };

            const chunk = text.substring(0, 5000);
            const tabCount = (chunk.match(/\\t/g) || []).length;
            const commaCount = (chunk.match(/,/g) || []).length;
            const delimiter = tabCount >= commaCount && tabCount > 0 ? '\\t' : ',';

            const rows = [];
            let currentRow = [];
            let currentValue = '';
            let insideQuote = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (insideQuote && nextChar === '"') {
                        currentValue += '"';
                        i++;
                    } else {
                        insideQuote = !insideQuote;
                    }
                } else if (char === delimiter && !insideQuote) {
                    currentRow.push(currentValue);
                    currentValue = '';
                } else if ((char === '\\n' || char === '\\r') && !insideQuote) {
                    if (char === '\\r' && nextChar === '\\n') i++;
                    currentRow.push(currentValue);
                    rows.push(currentRow);
                    currentRow = [];
                    currentValue = '';
                } else {
                    currentValue += char;
                }
            }
            if (currentValue || currentRow.length > 0) {
                currentRow.push(currentValue);
                rows.push(currentRow);
            }

            if (rows.length === 0) return { headers: [], data: [] };

            const headers = rows[0].map(h => h.trim());
            const data = rows.slice(1).map(row => {
                const obj = {};
                headers.forEach((h, index) => {
                    let val = row[index] || '';
                    obj[h] = val;
                });
                return obj;
            });

            return { headers, data };
        }

        function cleanEmailField(value) {
            if (!value) return '';
            let cleaned = value.replace(/[\\n\\r, ]+/g, ';');
            cleaned = cleaned.replace(/;+/g, ';');
            cleaned = cleaned.replace(/^;+|;+$/g, '');
            return cleaned;
        }

        function parseData() {
            const result = parseCSVToObjects(state.csvInput);
            state.headers = result.headers;

            state.parsedData = result.data.map(row => {
                const newRow = { ...row };
                Object.keys(newRow).forEach(key => {
                    const kLower = key.toLowerCase();
                    if (['email', '收件人', '信箱', 'cc', 'bcc', '副本', '密件副本'].some(term => kLower.includes(term))) {
                        newRow[key] = cleanEmailField(newRow[key]);
                    }
                });
                return newRow;
            });

            state.displayData = [];
            updateDataUI();

            updateGroupingUI();
            applyGrouping();
        }

        function updateDataUI() {
            els.dataCount.innerText = \`共 \${state.displayData.length} 筆\`;

            if (state.displayData.length > 0) {
                let tableHTML = \`<table class="min-w-full divide-y divide-gray-200"><thead class="bg-warm-bg sticky-header"><tr>\`;
                state.headers.forEach(h => {
                    tableHTML += \`<th class="px-3 py-2 text-left text-xs font-medium text-warm-gray uppercase whitespace-nowrap bg-warm-bg">\${h}<\/th>\`;
                });
                tableHTML += \`<\/tr><\/thead><tbody class="bg-white divide-y divide-gray-200">\`;

                state.displayData.forEach(row => {
                    tableHTML += \`<tr>\`;
                    state.headers.forEach(h => {
                        let cellContent = row[h] || '';
                        if (cellContent.length > 30) cellContent = cellContent.substring(0, 30) + '...';
                        tableHTML += \`<td class="px-3 py-2 text-sm text-warm-black whitespace-nowrap" title="\${row[h]}">\${cellContent}<\/td>\`;
                    });
                    tableHTML += \`<\/tr>\`;
                });
                tableHTML += \`<\/tbody><\/table>\`;
                els.tablePreview.innerHTML = tableHTML;
                els.tablePreview.classList.remove('hidden');
            } else {
                els.tablePreview.classList.add('hidden');
            }

            els.variableButtons.innerHTML = '';
            state.headers.forEach(h => {
                const btn = document.createElement('button');
                btn.className = "var-btn";
                btn.innerText = \`{\${h}}\`;
                btn.onmousedown = (e) => insertVariable(e, \`{\${h}}\`);
                els.variableButtons.appendChild(btn);
            });
        }

        function toggleBCC() {
            state.showBCC = els.bccToggle.checked;
            updateBCCVisibility();
            saveState();
        }

        function updateBCCVisibility() {
            const container = els.previewContainer;
            if (state.showBCC) {
                container.classList.add('show-bcc');
            } else {
                container.classList.remove('show-bcc');
            }
        }

        function saveState() {
            try {
                const dataToSave = {
                    csvInput: state.csvInput,
                    subjectTemplate: state.subjectTemplate,
                    bodyTemplate: state.bodyTemplate,
                    grouping: state.grouping,
                    showBCC: state.showBCC
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
            } catch (e) { console.error(e); }
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.csvInput = parsed.csvInput !== undefined ? parsed.csvInput : defaultData;
                    state.subjectTemplate = parsed.subjectTemplate !== undefined ? parsed.subjectTemplate : '關於 {學校} 的 {課程名稱} 開課通知';
                    state.bodyTemplate = parsed.bodyTemplate !== undefined ? parsed.bodyTemplate : defaultBody;
                    if (parsed.grouping) state.grouping = parsed.grouping;
                    if (parsed.showBCC !== undefined) state.showBCC = parsed.showBCC;
                }
            } catch (e) { console.error(e); }
        }

        function clearData() {
            if (confirm("確定要清空所有資料嗎？此動作無法復原。")) {
                state.csvInput = "";
                els.csvInput.value = "";
                parseData();
                saveState();
            }
        }

        function clearTemplate() {
            if (confirm("確定要清空主旨與內文模板嗎？")) {
                state.subjectTemplate = "";
                state.bodyTemplate = "";
                els.subjectInput.value = "";
                els.editor.innerHTML = "";
                saveState();
            }
        }

        function toggleGrouping() {
            state.grouping.enabled = els.groupEnable.checked;
            if (state.grouping.enabled) {
                els.groupSettings.classList.remove('hidden');
            } else {
                els.groupSettings.classList.add('hidden');
            }
            if (state.grouping.enabled && !state.grouping.column && state.headers.length > 0) {
                state.grouping.column = state.headers[0];
            }
            updateGroupingUI();
            applyGrouping();
            saveState();
        }

        function updateGroupingColumn() {
            state.grouping.column = els.groupColumn.value;
            applyGrouping();
            saveState();
        }

        function updateGroupingUI() {
            els.groupColumn.innerHTML = '';
            state.headers.forEach(h => {
                const option = document.createElement('option');
                option.value = h;
                option.text = h;
                if (h === state.grouping.column) option.selected = true;
                els.groupColumn.appendChild(option);
            });
        }

        function applyGrouping() {
            if (!state.grouping.enabled || !state.grouping.column || state.parsedData.length === 0) {
                state.displayData = [...state.parsedData];
            } else {
                const groupMap = new Map();
                const targetCol = state.grouping.column;

                state.parsedData.forEach(row => {
                    const key = row[targetCol] || '(未分類)';
                    if (!groupMap.has(key)) {
                        const initialObj = {};
                        state.headers.forEach(h => { initialObj[h] = [row[h]]; });
                        groupMap.set(key, initialObj);
                    } else {
                        const existingObj = groupMap.get(key);
                        state.headers.forEach(h => { if (row[h]) existingObj[h].push(row[h]); });
                    }
                });

                state.displayData = Array.from(groupMap.values()).map(groupObj => {
                    const finalRow = {};
                    state.headers.forEach(h => {
                        const values = groupObj[h];
                        let allValues = [];
                        values.forEach(v => {
                            if (!v) return;
                            v.split(';').forEach(subV => {
                                const trimV = subV.trim();
                                if (trimV) allValues.push(trimV);
                            });
                        });

                        const uniqueValues = [...new Set(allValues)];
                        const hLower = h.toLowerCase();
                        const isRecipient = hLower === 'email' || h === '收件人' || h === '信箱';
                        const isCC = hLower.includes('cc') || h.includes('副本');
                        const isBCC = hLower.includes('bcc') || h.includes('密件');

                        if (isRecipient || (isCC && !hLower.includes('bcc') && !h.includes('密件')) || isBCC) {
                            finalRow[h] = uniqueValues.join('; ');
                        } else if (h === targetCol) {
                            finalRow[h] = uniqueValues.length > 0 ? uniqueValues[0] : '';
                        } else {
                            const simpleUnique = [...new Set(values)];
                            finalRow[h] = simpleUnique.join('、');
                        }
                    });
                    return finalRow;
                });
            }
            updateDataUI();
        }

        function handleToolbar(e, command) {
            e.preventDefault();
            if (command === 'createLink') {
                saveSelection();
                openLinkModal();
            } else if (command === 'unlink') {
                els.editor.focus();
                document.execCommand('unlink', false, null);
            } else if (command === 'removeFormat') {
                els.editor.focus();
                document.execCommand('removeFormat', false, null);
                // Also clean up common span trash manually if needed
                const sel = window.getSelection();
                if (!sel.isCollapsed) {
                    // Optional: Aggressive cleanup logic could go here
                }
            } else {
                els.editor.focus();
                document.execCommand(command, false, null);
            }
        }

        function openLinkModal() {
            els.linkUrlInput.value = '';
            els.linkModalVariables.innerHTML = '';
            state.headers.forEach(h => {
                const btn = document.createElement('button');
                btn.className = "var-btn";
                btn.innerText = \`{\${h}}\`;
                btn.onclick = () => addVariableToLinkInput(\`{\${h}}\`);
                els.linkModalVariables.appendChild(btn);
            });
            els.linkModal.classList.remove('hidden');
            els.linkUrlInput.focus();
        }

        function closeLinkModal() {
            els.linkModal.classList.add('hidden');
        }

        function addVariableToLinkInput(variableStr) {
            const input = els.linkUrlInput;
            const startPos = input.selectionStart;
            const endPos = input.selectionEnd;
            const text = input.value;
            input.value = text.substring(0, startPos) + variableStr + text.substring(endPos);
            const newPos = startPos + variableStr.length;
            input.setSelectionRange(newPos, newPos);
            input.focus();
        }

        function confirmInsertLink() {
            const url = els.linkUrlInput.value.trim();
            closeLinkModal();
            restoreSelection();
            if (url) {
                document.execCommand('createLink', false, url);
            }
        }

        function saveSelection() {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) savedRange = sel.getRangeAt(0);
        }
        function restoreSelection() {
            if (savedRange) {
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedRange);
            }
        }
        function closeAllMenus() {
            document.querySelectorAll('.color-menu').forEach(menu => menu.classList.remove('open'));
        }
        function toggleColorMenu(e, menuId) {
            e.preventDefault(); e.stopPropagation();
            saveSelection();
            const menu = document.getElementById(menuId);
            const isOpen = menu.classList.contains('open');
            closeAllMenus();
            if (!isOpen) menu.classList.add('open');
        }
        function applyColor(e, command, value) {
            e.preventDefault(); e.stopPropagation();
            restoreSelection();
            els.editor.focus();
            document.execCommand(command, false, value);
            state.bodyTemplate = els.editor.innerHTML;
            saveState();
            closeAllMenus();
        }

        function insertVariable(e, variable) {
            e.preventDefault();

            if (lastFocusedElement === els.subjectInput) {
                const input = els.subjectInput;
                const start = input.selectionStart;
                const end = input.selectionEnd;
                const val = input.value;
                input.value = val.substring(0, start) + variable + val.substring(end);
                input.selectionStart = input.selectionEnd = start + variable.length;
                input.focus();

                state.subjectTemplate = input.value;
                saveState();
            } else {
                els.editor.focus();
                document.execCommand('insertText', false, variable);
                state.bodyTemplate = els.editor.innerHTML;
                saveState();
            }
        }

        function cleanHtmlLinks(htmlString) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlString;
            const links = tempDiv.querySelectorAll('a');

            links.forEach(link => {
                const href = link.getAttribute('href');
                if (!href || href.trim() === '' || href.trim() === 'http://' || href.trim() === 'https://') {
                    while (link.firstChild) {
                        link.parentNode.insertBefore(link.firstChild, link);
                    }
                    link.parentNode.removeChild(link);
                }
            });
            return tempDiv.innerHTML;
        }

                                    \${finalSubject}
                                <\/div>
                                <button onclick="copySimpleText(this, '\${finalSubject}')" class="p-2 text-warm-gray hover:text-primary hover:bg-info-bg rounded border border-warm-border transition-colors" title="複製主旨"><i data-lucide="copy" class="w-4 h-4"><\/i><\/button>
                            <\/div>
                        <\/div>
                        <div class="mt-4 pt-4 border-t border-warm-border">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold text-warm-gray uppercase">內文預覽<\/span>
                                <button onclick="copyToClipboard(this, \${index})" data-content="\${encodeURIComponent(finalBodyHtml)}" class="flex items-center gap-1 px-3 py-1.5 bg-primary text-white rounded text-sm hover:bg-primary-hover transition-colors shadow-sm font-bold">
                                    <i data-lucide="copy" class="h-4 w-4"><\/i> 複製內文 (含格式)
                                <\/button>
                            <\/div>
                            <div class="p-4 bg-white border border-warm-border rounded text-sm text-warm-black leading-relaxed max-w-none email-content" style="font-family: Calibri, sans-serif; font-size: 12pt;">\${finalBodyHtml}<\/div>

                els.previewContainer.appendChild(card);
            });
            updateBCCVisibility();
            if (window.lucide && typeof window.lucide.createIcons === 'function') {

        function switchTab(tabName) {
            Object.keys(els.btns).forEach(key => {
                const btn = els.btns[key];
                if (key === tabName) {
                    btn.className = "tab-pill on";
                } else {
                    btn.className = "tab-pill";
                }
            });

            Object.keys(els.tabs).forEach(key => {
                const tab = els.tabs[key];
                if (key === tabName) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            if (tabName === 'preview') {
                renderPreview();
            }
        }

        function replaceVariables(template, rowData) {
            let result = template;
            state.headers.forEach(header => {
                const value = rowData[header] || '';

                result = result.split(\`{\${header}}\`).join(value);

                if (value.length > 0) {
                    const surname = value.charAt(0);
                    result = result.split(\`{\${header}:姓}\`).join(surname);
                } else {
                    result = result.split(\`{\${header}:姓}\`).join('');
                }

                let prefix = value;
                if (value.includes('@')) {
                    prefix = value.split('@')[0];
                }
                result = result.split(\`{\${header}:前}\`).join(prefix);

                const encodedKey = \`%7B\${header}%7D\`;
                result = result.split(encodedKey).join(value);
            });
            return result;
        }

        function copySimpleText(btn, text) {
            if (!text) return;
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed'; textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                const originalIcon = btn.innerHTML;
                btn.innerHTML = \`<i data-lucide="check" class="w-4 h-4 text-green-600"><\/i>\`;
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    lucide.createIcons();
                }
                setTimeout(() => {
                    btn.innerHTML = originalIcon;
                    if (window.lucide && typeof window.lucide.createIcons === 'function') {
                        lucide.createIcons();
                    }
                }, 1500);
            } catch (err) { alert('複製失敗'); } finally { document.body.removeChild(textarea); }
        }

        /**
         * Helper function to convert any color string to Hex
         * Supports: "rgb(r, g, b)", "rgba(r, g, b, 1)", and basic named colors if browser parses them.
         */
        function forceHexColor(colorStr) {
            if (!colorStr) return null;
            // Check for RGB/RGBA
            const rgbMatch = colorStr.match(/^rgba?\\((\\d+),\\s*(\\d+),\\s*(\\d+)(?:,\\s*1)?\\)$/i);
            if (rgbMatch) {
                const r = parseInt(rgbMatch[1]);
                const g = parseInt(rgbMatch[2]);
                const b = parseInt(rgbMatch[3]);
                const toHex = (n) => { const hex = n.toString(16); return hex.length === 1 ? '0' + hex : hex; };
                return \`#\${toHex(r)}\${toHex(g)}\${toHex(b)}\`;
            }
            // If it's already hex, return it
            if (colorStr.startsWith('#')) return colorStr;
            // If it's a named color (rarely returned by style object in modern browsers unless explicitly set), 
            // we leave it as is, Outlook usually handles standard names (red, blue) ok, but Hex is best.
            // But usually browsers convert named to RGB in computed style.
            return colorStr;
        }

        function copyToClipboard(btn, index) {
            const rawHtml = decodeURIComponent(btn.getAttribute('data-content'));
            const processor = document.createElement('div');
            processor.innerHTML = rawHtml;
            const fontFamily = "'Calibri', sans-serif";
            const fontSize = "12pt";
            const defaultColor = "#000000";

            const allElements = processor.querySelectorAll('*');

            // --- CLEANING PASS: WHITELIST REBUILD ---
            // Iterate all elements and aggressively rebuild their style attributes
            // to strip all --tw-* variables and other noise.
            allElements.forEach(el => {
                const computedStyle = el.style; // Access the inline style object directly
                const newStyles = [];
                let hasBg = false;

                // 1. Extract Core Properties
                // We manually check the inline style properties we care about
                const targetProps = [
                    'color',
                    'background-color',
                    'font-weight',
                    'font-style',
                    'text-decoration',
                    'text-align',
                    'vertical-align'
                ];

                targetProps.forEach(prop => {
                    let val = computedStyle.getPropertyValue(prop);
                    if (val && val !== 'initial' && val !== 'inherit' && val !== 'transparent' && val !== 'rgba(0, 0, 0, 0)') {

                        // Fix Colors to Hex
                        if (prop.includes('color')) {
                            const hex = forceHexColor(val);
                            if (hex) val = hex;
                        }

                        // Special Handling for Background
                        if (prop === 'background-color') {
                            hasBg = true;
                            // Add background shorthand for Outlook safety
                            newStyles.push(\`background: \${val}\`);
                        }

                        newStyles.push(\`\${prop}: \${val}\`);
                    }
                });

                // 2. Add MSO Highlight (The Nuclear Fix)
                // If we detected a background color, we force an mso-highlight property.
                if (hasBg) {
                    // Try to match standard colors, otherwise default to yellow or just let shading handle it
                    const bgVal = forceHexColor(computedStyle.backgroundColor)?.toUpperCase();
                    let msoName = 'yellow'; // Default fallback

                    if (bgVal === '#FFFF00') msoName = 'yellow';
                    else if (bgVal === '#00FF00' || bgVal === '#008000') msoName = 'lime';
                    else if (bgVal === '#00FFFF') msoName = 'cyan';
                    else if (bgVal === '#FF00FF') msoName = 'magenta';
                    else if (bgVal === '#0000FF') msoName = 'blue';
                    else if (bgVal === '#FF0000') msoName = 'red';
                    else if (bgVal === '#000000') msoName = 'black';
                    else if (bgVal === '#D1D5DB' || bgVal === '#C0C0C0') msoName = 'gray-25';

                    // Inject mso-highlight. This tells Word/Outlook "This is a highlighter pen"
                    newStyles.push(\`mso-highlight: \${msoName}\`);
                }

                // 3. FORCE Font Uniformity (Override everything else)
                newStyles.push(\`font-family: \${fontFamily}\`);
                newStyles.push(\`font-size: \${fontSize}\`);

                // 4. Handle Tag-Specific Styles (Re-apply semantic styles)
                if (['B', 'STRONG'].includes(el.tagName)) newStyles.push('font-weight: bold');
                if (['I', 'EM'].includes(el.tagName)) newStyles.push('font-style: italic');
                if (['U'].includes(el.tagName)) newStyles.push('text-decoration: underline');
                if (el.tagName === 'A') {
                    newStyles.push('color: blue');
                    newStyles.push('text-decoration: underline');
                }
                if (['UL', 'OL'].includes(el.tagName)) {
                    newStyles.push('margin-left: 24px');
                    newStyles.push('padding-left: 0');
                }
                if (el.tagName === 'LI') {
                    newStyles.push('margin-bottom: 4px');
                }

                // 5. REPLACE the entire style attribute
                // This strips out all the --tw-* garbage and keeps only what we just built
                if (newStyles.length > 0) {
                    el.setAttribute('style', newStyles.join('; '));
                } else {
                    el.removeAttribute('style');
                }
            });

            // Wrap in a div that enforces global font/color for the paste operation
            const finalHtml = \`<div style="font-family: \${fontFamily}; font-size: \${fontSize}; color: \${defaultColor};">\${processor.innerHTML}<\/div>\`;
            const plainText = processor.innerText || processor.textContent;

            const listener = (e) => {
                e.preventDefault();
                e.clipboardData.setData('text/html', finalHtml);
                e.clipboardData.setData('text/plain', plainText);
            };
            document.addEventListener('copy', listener);
            try {
                const successful = document.execCommand('copy');
                document.removeEventListener('copy', listener);
                if (successful) {
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = \`<i data-lucide="check" class="h-4 w-4"><\/i> 已複製\`;
                    btn.classList.remove('bg-primary', 'hover:bg-primary-hover');
                    btn.classList.add('bg-green-600', 'hover:bg-green-700');

                    const card = document.getElementById(\`card-\${index}\`);
                    if (card) {
                        card.classList.add('card-copied');
                    }

                    if (window.lucide && typeof window.lucide.createIcons === 'function') {
                        lucide.createIcons();
                    }
                    setTimeout(() => {
                        btn.innerHTML = originalHtml;
                        btn.classList.add('bg-primary', 'hover:bg-primary-hover');
                        btn.classList.remove('bg-green-600', 'hover:bg-green-700');
                        if (window.lucide && typeof window.lucide.createIcons === 'function') {
                            lucide.createIcons();
                        }
                    }, 2000);
                } else { alert("複製失敗"); }
            } catch (err) {
                document.removeEventListener('copy', listener);
                alert("瀏覽器不支援，請手動複製");
            }
        }

        window.switchTab = switchTab;
        window.clearData = clearData;
        window.clearTemplate = clearTemplate;
        window.toggleGrouping = toggleGrouping;
        window.updateGroupingColumn = updateGroupingColumn;
        window.toggleBCC = toggleBCC;
        window.handleToolbar = handleToolbar;
        window.toggleColorMenu = toggleColorMenu;
        window.applyColor = applyColor;
        window.insertVariable = insertVariable;
        window.copyToClipboard = copyToClipboard;
        window.copySimpleText = copySimpleText;

        window.openLinkModal = openLinkModal;
        window.closeLinkModal = closeLinkModal;
        window.confirmInsertLink = confirmInsertLink;
        window.addVariableToLinkInput = addVariableToLinkInput;

        // Initialize safely
        init();
<\/script>
<\/body>
<\/html>`
  };

  function loadFrame(id) {
    if (loaded[id]) return;
    loaded[id] = true;
    var iframe = document.getElementById('frame-' + id);
    var loader = document.getElementById('loader-' + id);
    var blob = new Blob([contents[id]], { type: 'text/html; charset=utf-8' });
    iframe.onload = function() {
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(function() { if (loader.parentNode) loader.parentNode.removeChild(loader); }, 400);
      }
    };
    iframe.src = URL.createObjectURL(blob);
  }

  function switchTab(id) {
    TABS.forEach(function(t) {
      document.querySelector('[data-tab="' + t + '"]').classList.toggle('active', t === id);
      document.getElementById('frame-' + t).classList.toggle('active', t === id);
      var loader = document.getElementById('loader-' + t);
      if (loader) loader.classList.toggle('hidden', t !== id);
    });
    loadFrame(id);
  }

  function toggleNav() {
    navCollapsed = !navCollapsed;
    var inner = document.getElementById('nav-inner');
    var btn = document.getElementById('nav-toggle');
    inner.classList.toggle('collapsed', navCollapsed);
    btn.textContent = navCollapsed ? '▼' : '▲';
    btn.title = navCollapsed ? '展開導覽列' : '收合導覽列';
  }

  loadFrame('taica');
